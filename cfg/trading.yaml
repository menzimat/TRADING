# ============================================================
# Trading Configuration
#
# Central configuration for order entry defaults,
# price offsets, hotkey mappings, and reusable templates.
#
# TIF Notes
# ---------
# DAY
#     Normal regular-market trading (current default)
#
# DAY_EXT
#     Day + extended hours (premarket/after-hours)
#
# GTC
#     Good Till Cancelled
#
# GTC_EXT
#     GTC including extended hours
#
# For now we default to DAY while developing.
# ============================================================


defaults:

  side: BUY

  account: default

  quantity:
    type: fixed          # fixed | risk | percent
    value: 100

  tif: DAY

  order_type: LIMIT

  price_basis: ask       # ask | bid | market

  price_offset: default


# ------------------------------------------------------------
# Named price offsets
# ------------------------------------------------------------

price_offsets:

  default:
    value: 0.10
    units: dollars       # dollars | percent | ticks

  aggressive:
    value: 0.02
    units: dollars

  passive:
    value: -0.05
    units: dollars

  market:
    value: 0
    units: dollars


# ------------------------------------------------------------
# Hotkey bindings
#
# Each hotkey invokes one template.
# ------------------------------------------------------------

hotkeys:

  ctrl+b: buy_limit

  ctrl+s: sell_limit

  shift+f: flatten

  esc: cancel_all

  ctrl+shift+q: panic

  ctrl+shift+u: refresh_quotes


# ------------------------------------------------------------
# Reusable order templates
# ------------------------------------------------------------

templates:

  buy_limit:

    template_name: "buy_limit"

    template_display_name: "Buy Limit"

    side: BUY

    order_type: LIMIT

    quantity:
      type: fixed
      value: 100

    price:

      basis: ask

      offset: default

    tif: DAY


  sell_limit:
    template_name: "sell_limit"

    template_display_name: "Sell Limit"

    side: SELL

    order_type: LIMIT

    quantity:
      type: fixed
      value: 100

    price:

      basis: bid

      offset: default

    tif: DAY


  buy_market:
    template_name: "buy_market"

    template_display_name: "Buy Market"

    side: BUY

    order_type: MARKET

    quantity:
      type: fixed
      value: 100

    price:

      basis: market

    tif: DAY


  sell_market:
    template_name: "sell_market"

    template_display_name: "Sell Market"

    side: SELL

    order_type: MARKET

    quantity:
      type: fixed
      value: 100

    price:

      basis: market

    tif: DAY


  flatten:

    action: FLATTEN


  cancel_all:

    action: CANCEL_ALL


  panic:

    action: PANIC_EXIT


  refresh_quotes:

    action: REFRESH_QUOTES
