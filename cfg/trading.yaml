# ============================================================
# Trading Configuration
#
# Central configuration for order entry defaults,
# price offsets, hotkey mappings, and reusable templates.
#
# TIF Notes
# ---------
# DAY
#     Normal regular-market trading (current default)
#
# DAY_EXT
#     Day + extended hours (premarket/after-hours)
#
# GTC
#     Good Till Cancelled
#
# GTC_EXT
#     GTC including extended hours
#
# For now we default to DAY while developing.
# ============================================================


defaults:

  side: BUY

  account: default

  quantity:
    type: fixed          # fixed | risk | percent (SELL percent uses cached position)
    value: 100

  tif: DAY

  order_type: LIMIT

  price_basis: ask       # ask | bid | market

  price_offset: default


# ------------------------------------------------------------
# Named price offsets
# ------------------------------------------------------------

price_offsets:

  default:
    value: 0.01
    units: dollars       # dollars | percent | ticks

  aggressive:
    value: 0.02
    units: dollars

  passive:
    value: -0.05
    units: dollars

  market:
    value: 0
    units: dollars


# ------------------------------------------------------------
# Hotkey bindings
#
# Each hotkey invokes one template.
# ------------------------------------------------------------

hotkeys:

  shift+1:
    template: buy_limit
    overrides:
      quantity:
        type: fixed
        value: 100
      price:
        offset: aggressive

  shift+2:
    template: buy_limit
    overrides:
      quantity:
        type: fixed
        value: 200
      price:
        offset: aggressive

  shift+3:
    template: buy_limit
    overrides:
      quantity:
        type: fixed
        value: 300
      price:
        offset: aggressive

  shift+4:
    template: buy_limit
    overrides:
      quantity:
        type: fixed
        value: 400
      price:
        offset: aggressive

  shift+5:
    template: buy_limit
    overrides:
      quantity:
        type: fixed
        value: 500
      price:
        offset: aggressive

  shift+6:
    template: buy_limit
    overrides:
      quantity:
        type: fixed
        value: 600
      price:
        offset: aggressive

  shift+7:
    template: buy_limit
    overrides:
      quantity:
        type: fixed
        value: 700
      price:
        offset: aggressive

  shift+8:
    template: buy_limit
    overrides:
      quantity:
        type: fixed
        value: 800
      price:
        offset: aggressive

  shift+9:
    template: buy_limit
    overrides:
      quantity:
        type: fixed
        value: 900
      price:
        offset: aggressive

  shift+0:
    template: buy_limit
    overrides:
      quantity:
        type: fixed
        value: 1000
      price:
        offset: aggressive

  ctrl+b: buy_limit

  ctrl+s: sell_limit

  ctrl+z: flatten

  ctrl+x: sell_limit_half

  ctrl+c: sell_limit_qtr

  ctrl+f: flatten

  esc: cancel_all

  ctrl+shift+q: panic

  ctrl+shift+u: refresh_quotes


# ------------------------------------------------------------
# Reusable order templates
# ------------------------------------------------------------

templates:

  buy_limit:

    template_name: "buy_limit"

    template_display_name: "Buy Limit"

    side: BUY

    order_type: LIMIT

    quantity:
      type: fixed
      value: 100

    price:

      basis: ask

      offset: default

    tif: DAY


  sell_limit:
    template_name: "sell_limit"

    template_display_name: "Sell Limit"

    side: SELL

    order_type: LIMIT

    quantity:
      type: fixed
      value: 100

    price:

      basis: bid

      offset: default

    tif: DAY

  sell_limit_half:
    template_name: "sell_limit_half"

    template_display_name: "Sell Limit Half"

    side: SELL

    order_type: LIMIT

    quantity:
      type: percent
      value: 50

    price:

      basis: bid

      offset: default

    tif: DAY

  sell_limit_qtr:
    template_name: "sell_limit_qtr"

    template_display_name: "Sell Limit Quarter"

    side: SELL

    order_type: LIMIT

    quantity:
      type: percent
      value: 25

    price:

      basis: bid

      offset: default

    tif: DAY


  buy_market:
    template_name: "buy_market"

    template_display_name: "Buy Market"

    side: BUY

    order_type: MARKET

    quantity:
      type: fixed
      value: 100

    price:

      basis: market
      offset: market

    tif: DAY


  sell_market:
    template_name: "sell_market"

    template_display_name: "Sell Market"

    side: SELL

    order_type: MARKET

    quantity:
      type: fixed
      value: 100

    price:

      basis: market
      offset: market

    tif: DAY


  flatten:

    action: FLATTEN


  cancel_all:

    action: CANCEL_ALL


  panic:

    action: PANIC_EXIT


  refresh_quotes:

    action: REFRESH_QUOTES
